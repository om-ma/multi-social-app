# Nginx config for SocialApp
# Copy to /etc/nginx/sites-available/social_app and symlink to sites-enabled
#
# Setup:
#   sudo cp social_app.conf /etc/nginx/sites-available/social_app
#   sudo ln -s /etc/nginx/sites-available/social_app /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d social-mvp.omsolutionz.com
#   sudo nginx -t && sudo systemctl reload nginx

upstream social_app {
    server 127.0.0.1:4003;
}

server {
    listen 80;
    server_name social-mvp.omsolutionz.com;

    # Redirect HTTP to HTTPS (certbot will modify this)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name social-mvp.omsolutionz.com;

    # SSL certificates (certbot will populate these)
    # ssl_certificate /etc/letsencrypt/live/social-mvp.omsolutionz.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/social-mvp.omsolutionz.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size
    client_max_body_size 20M;

    location / {
        proxy_pass http://social_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for LiveView
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health check (no SSL enforcement)
    location /health {
        proxy_pass http://social_app;
        proxy_set_header Host $host;
    }
}
