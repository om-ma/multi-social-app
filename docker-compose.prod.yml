services:
  social_app:
    image: social_app:latest
    container_name: social_app
    restart: unless-stopped
    network_mode: host
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=${PHX_HOST:-localhost}
      - PORT=${PORT:-4003}
      - PHX_SERVER=true
      - MIX_ENV=prod
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:4003/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
